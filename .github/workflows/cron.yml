name: keep server alive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: ping server
        run: |
          curl https://voicebox-api-zmw2.onrender.com/health \
          --retry 3 \
          --retry-delay 10 \
          --retry-all-errors \
          --max-time 60 \
          --silent \
          --show-error
